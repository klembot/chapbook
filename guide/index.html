<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="color-scheme" content="dark light">
		<title>Chapbook Guide Language Selection</title>
		<style>
			body {
				display: grid;
				align-items: center;
				font: 24px 'Iowan Old Style', Constantia, Georgia, serif;
				justify-content: center;
				min-height: 100vh;
			}
			ul {
				list-style: none;
				padding-left: 0;
				margin-left: 0;
				text-align: center;
			}
			li {
				padding-left: 0;
				margin-left: 0;
				margin-bottom: 1em;
			}
		</style>
	</head>
	<body>
		<ul>
			<li><a href="en/">English</a></li>
			<li><a href="zh-hans/">简体中文</a></li>
		</ul>
	</body>
</html>
